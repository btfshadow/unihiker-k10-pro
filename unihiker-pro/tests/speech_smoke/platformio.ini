[platformio]
default_envs = unihiker_k10_smoke
extra_configs = ../../../platformio.ini

[env]
extends       = common
lib_extra_dirs =
    ../../
    ../../../external_packages/framework-arduinounihiker/libraries
extra_scripts =
    pre:../../scripts/ptbr_model_builder.py
build_src_flags =
    -I ../../src

[env:unihiker_k10_smoke]
custom_ptbr_model_policy = error
custom_ptbr_model_manifest = ../../assets/speech-models/ptbr/v1/manifest.json
build_unflags =
    -DCORE_DEBUG_LEVEL=3
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=1
    ; Project-level PTBR support is handled by scripts/ptbr_model_builder.py.
    ; Strict mode: build fails if PTBR artifacts are missing.
    -DModel=PTBR

[env:unihiker_k10_smoke_legacy]
extends = env:unihiker_k10_smoke
custom_ptbr_model_policy = fallback_en

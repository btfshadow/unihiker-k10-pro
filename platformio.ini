# Root platformio.ini — shared base for all sub-projects
# Individual projects under unihiker-pro/tests/ include this via extends

[common]
platform      = https://github.com/DFRobot/platform-unihiker.git
board         = unihiker_k10
framework     = arduino
monitor_speed = 115200
upload_port   = /dev/cu.usbmodem*
monitor_port  = /dev/cu.usbmodem*
build_flags   =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3

# Default environment (empty — use sub-project envs)
[env]
